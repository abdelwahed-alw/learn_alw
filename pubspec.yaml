name: salearn
description: "Salearn – AI-powered language learning app with Gemini BYOK."
publish_to: 'none'

version: 1.2.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Google Gemini AI SDK (BYOK model)
  google_generative_ai: ^0.4.6

  # Robust state management via ChangeNotifier
  provider: ^6.1.2

  # Persistent local storage for languages, topic, level
  shared_preferences: ^2.3.3

  # Secure storage for API key
  flutter_secure_storage: ^9.2.4

  # Open YouTube link in browser
  url_launcher: ^6.3.1

  # Premium UI: Typography and loading states
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Text-to-Speech for Listening exercises
  flutter_tts: ^4.2.2

  # Speech-to-Text for Speaking exercises
  speech_to_text: ^7.0.0

  # JSON-based i18n
  easy_localization: ^3.0.7

  # Audio playback from file
  audioplayers: ^6.6.0

  # AES decryption for activation codes
  encrypt: ^5.0.3

  # Audio recording to temp file
  record: ^5.2.1

  # Temporary directory path (transitive dep made explicit)
  path_provider: ^2.1.5
  font_awesome_flutter: ^11.0.0

  # Full app restart to clear stale state on language change
  flutter_phoenix: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png
    - assets/translations/
name: salearn
description: "Salearn – AI-powered language learning app with Gemini BYOK."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Google Gemini AI SDK (BYOK model)
  google_generative_ai: ^0.4.6

  # Robust state management via ChangeNotifier
  provider: ^6.1.2

  # Persistent local storage for API key, languages, topic
  shared_preferences: ^2.3.3

  # Open YouTube link in browser
  url_launcher: ^6.3.1

  # Premium UI: Typography and loading states
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png